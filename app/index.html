<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Data Reporter</title>
  <link rel="stylesheet" href="styles/main.css?v=1" />
</head>
<body>

<div id="fdr-root">

  <div class="fdr-content">

    <!-- ============ PANEL 1: Configure ============ -->
    <div class="fdr-panel" id="fdrConfigPanel">
      <div class="fdr-panel-header">
        <h2 class="fdr-panel-title">Configure Report</h2>
      </div>
      <div class="fdr-panel-body">

        <!-- Data category checkboxes -->
        <div class="fdr-section-label">Data Categories <span id="fdrCategoryCounter" class="fdr-counter-text">0 / 15 selected</span></div>
        <div class="fdr-categories" id="fdrCategoryChecks"></div>

        <!-- Per-category column pickers -->
        <div class="fdr-column-pickers" id="fdrColumnPickers"></div>

        <!-- Diagnostic picker (only for StatusData) -->
        <div class="fdr-diagnostic-picker" id="fdrDiagnosticPicker">
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrDiagnosticSelect">Diagnostic (required for Engine Data)</label>
            <select id="fdrDiagnosticSelect" class="fdr-select">
              <option value="">-- Select a diagnostic --</option>
              <option value="DiagnosticEngineSpeedId">Engine Speed (RPM)</option>
              <option value="DiagnosticEngineCoolantTemperatureId">Coolant Temperature</option>
              <option value="DiagnosticOdometerAdjustmentId">Odometer</option>
              <option value="DiagnosticFuelLevelId">Fuel Level</option>
              <option value="DiagnosticBatteryVoltageId">Battery Voltage</option>
              <option value="DiagnosticEngineOilTemperatureId">Engine Oil Temperature</option>
              <option value="DiagnosticEngineRoadSpeedId">Vehicle Speed</option>
            </select>
          </div>
        </div>

        <!-- Filters -->
        <div class="fdr-section-label">Filters</div>
        <div class="fdr-filters">
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrDateFrom">From</label>
            <input type="date" id="fdrDateFrom" class="fdr-input">
          </div>
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrDateTo">To</label>
            <input type="date" id="fdrDateTo" class="fdr-input">
          </div>
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrDeviceSelect">Device</label>
            <select id="fdrDeviceSelect" class="fdr-select">
              <option value="">All Devices (use group filter)</option>
            </select>
          </div>
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrResultsLimit">Limit</label>
            <input type="number" id="fdrResultsLimit" class="fdr-input" value="500" min="1" max="50000" step="100" style="min-width:100px;">
          </div>
        </div>

        <!-- Run button -->
        <div class="fdr-actions">
          <button class="fdr-btn fdr-btn-primary" id="fdrRunBtn">Run Report</button>
          <span class="fdr-status" id="fdrStatus"></span>
        </div>
      </div>
    </div>

    <!-- ============ PANEL 2: Results Table ============ -->
    <div class="fdr-panel fdr-results" id="fdrResultsPanel">
      <div class="fdr-tabs" id="fdrTabs"></div>

      <div class="fdr-panel-body">
        <!-- Table toolbar -->
        <div class="fdr-table-toolbar">
          <input type="text" class="fdr-input fdr-search" id="fdrSearch" placeholder="Search results...">
          <div style="flex:1"></div>
          <button class="fdr-btn fdr-btn-success" id="fdrExportCsvBtn">Export CSV</button>
          <button class="fdr-btn fdr-btn-secondary" id="fdrToggleChartBtn">Show Chart</button>
        </div>

        <!-- Table container -->
        <div id="fdrTableContainer"></div>

        <!-- Pagination -->
        <div class="fdr-pagination" id="fdrPagination">
          <span id="fdrPageInfo"></span>
          <div>
            <button id="fdrPrevBtn" class="fdr-btn fdr-btn-secondary">Previous</button>
            <button id="fdrNextBtn" class="fdr-btn fdr-btn-secondary">Next</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ PANEL 3: Chart ============ -->
    <div class="fdr-panel fdr-chart-panel" id="fdrChartPanel">
      <div class="fdr-panel-header">
        <h2 class="fdr-panel-title">Chart</h2>
        <button class="fdr-btn fdr-btn-secondary" id="fdrHideChartBtn" style="padding:0 16px;height:30px;font-size:13px;">Close</button>
      </div>
      <div class="fdr-panel-body">
        <div class="fdr-chart-controls">
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrChartType">Chart Type</label>
            <select id="fdrChartType" class="fdr-select">
              <option value="bar">Bar</option>
              <option value="line">Line</option>
              <option value="pie">Pie</option>
            </select>
          </div>
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrChartValueField">Value Field</label>
            <select id="fdrChartValueField" class="fdr-select"></select>
          </div>
          <div class="fdr-filter-group">
            <label class="fdr-label" for="fdrChartGroupField">Group By</label>
            <select id="fdrChartGroupField" class="fdr-select"></select>
          </div>
          <button class="fdr-btn fdr-btn-primary" id="fdrRenderChartBtn" style="align-self:flex-end;">Render Chart</button>
        </div>

        <div class="fdr-chart-container" id="fdrChartContainer">
          <canvas id="fdrCanvas"></canvas>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="scripts/main.js?v=1"></script>
</body>
</html>
